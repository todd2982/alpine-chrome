---

name: build-single-container
description: Build and push a single Docker container image to ghcr.
inputs:
  tag:
    description: The tag for the Docker image (e.g. "latest").
    required: true
  github_token:
    description: The GitHub token for authentication.
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx with docker driver
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: alpine-chrome
        tags: type=raw,value=${{ inputs.tag }}
        labels: |
          org.opencontainers.image.documentation=https://github.com/todd2982/alpine-chrome/blob/master/README.md
          org.opencontainers.image.vendor=todd2982

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        labels: ${{ steps.meta.outputs.labels }}
        tags: todd2982/alpine-chrome:${{ inputs.tag }}

    - name: Test
      env:
        IMAGE_NAME: todd2982/alpine-chrome:${{ inputs.tag }}
      run: ./test.sh
      shell: bash

    - name: Compute versioned tag
      id: tag
      env:
        IMAGE_NAME: todd2982/alpine-chrome:${{ inputs.tag }}
        CHROMIUM_VERSION_REGEXP: 'Chromium ([0-9]+)\.'
      run: |
        CURRENT_CHROMIUM_VERSION=$(docker container run --rm --entrypoint '' ${IMAGE_NAME} chromium-browser --version)
        if [[ ${CURRENT_CHROMIUM_VERSION} =~ ${CHROMIUM_VERSION_REGEXP} ]]; then
          echo "ℹ Successfully extracted Chromium major version of ${BASH_REMATCH[1]} from '${CURRENT_CHROMIUM_VERSION}'"
        else
          echo "❌ Cannot extract Chromium major version from '${CURRENT_CHROMIUM_VERSION}'" >&2
          exit 1
        fi
        echo "value=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Login to GitHub Container registry
      if: ${{ github.ref == 'refs/heads/master' }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: Set up Docker Buildx with docker-container driver
      if: ${{ github.ref == 'refs/heads/master' }}
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container

    - name: Build and push
      if: ${{ github.ref == 'refs/heads/master' }}
      env:
        IMAGE_NAME: alpine-chrome:${{ inputs.tag }}
        IMAGE_VERSIONED_NAME: alpine-chrome:${{ steps.tag.outputs.value }}
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        labels: ${{ steps.meta.outputs.labels }}
        tags: |
          ghcr.io/todd2982/${{ env.IMAGE_NAME }}
          ghcr.io/todd2982/${{ env.IMAGE_VERSIONED_NAME }}
        push: true
        cache-from: type=gha
        cache-to: type=gha
