---

name: build
on:
  pull_request:
  schedule:
    - cron: '25 4 * * 4'
  workflow_dispatch:

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build base container
        uses: ./.github/actions/build-single-container
        with:
          tag: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
